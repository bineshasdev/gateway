spring:
  application:
    name: gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── Keycloak / JWT ───────────────────────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:9080/realms/master}
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:9080/realms/master/protocol/openid-connect/certs}

  # ── Consul & Gateway ──────────────────────────────────────────────
  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        enabled: false
        register: false
        instance-id: ${spring.application.name}-${random.value}
        health-check-path: /actuator/health
        health-check-interval: 15s
        health-check-timeout: 5s
        prefer-ip-address: true
        tags:
          - version=${app.version:0.0.1}
          - env=${spring.profiles.active:dev}
      config:
        enabled: true
        prefixes: config
        default-context: gateway
        profile-separator: ':'
        format: YAML
        watch:
          enabled: true
          delay: 1000

    # ── Spring Cloud Gateway routes ────────────────────────────────
    gateway:
      server:
        webflux:
          routes:

            # --- Platform Service (/platform/** → http://localhost:8083) ---
            - id: platform-service-bootstrap
              uri: ${PLATFORM_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/platform/**
              filters:
                - StripPrefix=1

            # --- Tenant Service (/tenant/** → http://localhost:8080) ---
            - id: tenant-service
              uri: ${TENANT_SERVICE_URL:http://localhost:8080}
              predicates:
                - Path=/tenant/**
              filters:
                - StripPrefix=1

          # ── Global default filters ────────────────────────────────
          default-filters:
            - AddResponseHeader=X-Gateway, FlowCore-Gateway

          # ── CORS ──────────────────────────────────────────────────
          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true
                maxAge: 3600

server:
  port: ${SERVER_PORT:8888}

# ── Actuator ────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,consul
  endpoint:
    health:
      show-details: always

# ── Logging ─────────────────────────────────────────────────────────
logging:
  level:
    "[org.springframework.cloud.gateway]": TRACE
    "[org.springframework.cloud.gateway.route]": DEBUG
    "[org.springframework.cloud.gateway.handler]": DEBUG
    "[org.springframework.cloud.gateway.filter]": DEBUG
    "[reactor.netty.http.client]": DEBUG
    "[reactor.netty.http.server]": DEBUG
